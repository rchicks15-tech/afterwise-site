    .aw-steps{background:#0d1626;border-bottom:1px solid #1a2f4a;padding:0 40px;display:flex;}
    .aw-step{display:flex;align-items:center;gap:12px;padding:16px 24px 16px 0;cursor:default;opacity:0.4;transition:opacity 0.2s;}
    .aw-step.active{opacity:1;} .aw-step.done{opacity:0.75;cursor:pointer;} .aw-step.done:hover{opacity:1;}
    .aw-step-num{width:28px;height:28px;border-radius:50%;background:#1e3a5f;border:2px solid #2a5080;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:#7eb8f7;}
    .aw-step.active .aw-step-num{background:#4a9eff;border-color:#4a9eff;color:#fff;}
    .aw-step.done .aw-step-num{background:#1e4a2f;border-color:#2a7a4f;color:#5ce6aa;}
    .aw-step-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:#a8c4e0;}
    .aw-step.active .aw-step-label{color:#fff;}
    .aw-main{flex:1;padding:40px;max-width:1100px;margin:0 auto;width:100%;}
    .aw-section-title{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;color:#fff;margin-bottom:6px;text-transform:uppercase;letter-spacing:1px;}
    .aw-section-sub{font-size:13px;color:#5a7a9a;margin-bottom:32px;line-height:1.6;}
    .aw-dropzone{border:2px dashed #1e3a5f;background:rgba(14,26,46,0.6);padding:48px 32px;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:24px;}
    .aw-dropzone:hover,.aw-dropzone.drag-over{border-color:#4a9eff;background:rgba(74,158,255,0.05);}
    .aw-dz-icon{font-size:36px;margin-bottom:12px;}
    .aw-dz-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;color:#c8d8e8;margin-bottom:6px;}
    .aw-dz-sub{font-size:12px;color:#4a6a8a;}
    .aw-dz-types{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px;}
    .aw-type-badge{background:#1e3a5f;color:#7eb8f7;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;}
    .aw-url-row{display:flex;gap:12px;margin-bottom:24px;}
    .aw-input{flex:1;background:#0d1a2e;border:1px solid #1e3a5f;color:#e8edf5;font-family:'Barlow',sans-serif;font-size:13px;padding:10px 16px;outline:none;transition:border-color 0.2s;width:100%;}
    .aw-input:focus{border-color:#4a9eff;} .aw-input::placeholder{color:#3a5a7a;}
    .aw-btn{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;padding:10px 24px;cursor:pointer;border:none;transition:all 0.15s;}
    .aw-btn-primary{background:#4a9eff;color:#fff;} .aw-btn-primary:hover{background:#6ab0ff;}
    .aw-btn-primary:disabled{background:#1e3a5f;color:#3a5a7a;cursor:not-allowed;}
    .aw-btn-ghost{background:transparent;border:1px solid #1e3a5f;color:#7eb8f7;} .aw-btn-ghost:hover{border-color:#4a9eff;color:#4a9eff;}
    .aw-btn-success{background:#1e4a2f;border:1px solid #2a7a4f;color:#5ce6aa;} .aw-btn-success:hover{background:#2a6a3f;}
    .aw-btn-danger{background:transparent;border:1px solid #4a1a1a;color:#ff6b6b;font-size:11px;padding:4px 10px;}
    .aw-btn-danger:hover{background:rgba(255,107,107,0.08);}
    .aw-file-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px;}
    .aw-file-item{background:#0d1a2e;border:1px solid #1e3a5f;padding:10px 16px;display:flex;align-items:center;gap:12px;}
    .aw-file-icon{font-size:18px;flex-shrink:0;}
    .aw-file-name{font-size:13px;color:#c8d8e8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .aw-file-type{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#4a6a8a;flex-shrink:0;}
    .aw-file-size{font-size:11px;color:#3a5a7a;flex-shrink:0;}
    .aw-btn-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    .aw-count-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:#5a7a9a;text-transform:uppercase;letter-spacing:1px;}
    .aw-analysis-panel{background:#0d1a2e;border:1px solid #1e3a5f;padding:32px;margin-bottom:24px;}
    .aw-analysis-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#4a9eff;margin-bottom:20px;}
    .aw-analysis-body{font-size:13px;line-height:1.8;color:#a8c0d8;white-space:pre-wrap;}
    .aw-finding-card{background:#0a1520;border:1px solid #1e3a5f;border-left:4px solid #4a9eff;padding:20px 24px;margin-bottom:16px;}
    .aw-finding-card h4{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:600;color:#e0ecf8;margin-bottom:8px;}
    .aw-finding-card p{font-size:12.5px;color:#7a9ab8;line-height:1.7;}
    .aw-finding-root{margin-top:10px;padding:10px 12px;background:#070f1c;font-size:12px;color:#5a8ab0;line-height:1.6;}
    .aw-finding-root strong{font-size:10px;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:3px;color:#4a9eff;}
    .aw-metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:32px;}
    .aw-metric-card{background:#0d1626;border:1px solid #1e3a5f;padding:20px 16px;text-align:center;}
    .aw-metric-val{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:#4a9eff;}
    .aw-metric-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#5a7a9a;margin-top:4px;}
    .aw-metric-trend{font-size:11px;font-weight:600;margin-top:6px;}
    .aw-metric-trend.neg{color:#ff6b6b;} .aw-metric-trend.pos{color:#5ce6aa;}
    .aw-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 32px;text-align:center;}
    .aw-spinner{width:48px;height:48px;border:3px solid #1e3a5f;border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:20px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .aw-loading-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;color:#c8d8e8;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;}
    .aw-loading-sub{font-size:12px;color:#3a5a7a;}
    .aw-error{background:rgba(255,80,80,0.08);border:1px solid rgba(255,80,80,0.3);color:#ff8080;padding:16px 20px;font-size:13px;margin-bottom:24px;}
    .aw-aar-card{background:#0d1a2e;border:1px solid #1e3a5f;padding:32px;margin-bottom:24px;}
    .aw-aar-card h3{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:#fff;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px;}
    .aw-aar-options{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:24px;}
    .aw-aar-opt{flex:1;min-width:200px;background:#0a1520;border:2px solid #1e3a5f;padding:20px 24px;cursor:pointer;transition:all 0.15s;text-align:center;}
    .aw-aar-opt:hover{border-color:#4a9eff;} .aw-aar-opt.selected{border-color:#4a9eff;background:rgba(74,158,255,0.06);}
    .aw-aar-opt-icon{font-size:28px;margin-bottom:8px;}
    .aw-aar-opt-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#c8d8e8;}
    .aw-aar-opt-desc{font-size:11px;color:#4a6a8a;margin-top:4px;}
    .aw-timeline{display:flex;flex-direction:column;margin-bottom:24px;}
    .aw-tl-item{display:flex;gap:16px;position:relative;padding-bottom:20px;}
    .aw-tl-item:last-child{padding-bottom:0;}
    .aw-tl-dot{width:10px;height:10px;background:#4a9eff;border-radius:50%;flex-shrink:0;margin-top:4px;position:relative;z-index:1;}
    .aw-tl-line{position:absolute;left:4px;top:14px;bottom:0;width:2px;background:#1e3a5f;}
    .aw-tl-date{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:#4a9eff;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
    .aw-tl-event{font-size:13px;font-weight:500;color:#c8d8e8;margin-bottom:3px;}
    .aw-tl-impact{font-size:12px;color:#5a7a9a;}
    .aw-actions-list{display:flex;flex-direction:column;gap:12px;margin-bottom:32px;}
    .aw-action-item{display:flex;gap:16px;align-items:flex-start;background:#0a1520;border:1px solid #1e3a5f;padding:14px 18px;}
    .aw-action-num{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:#4a9eff;min-width:24px;line-height:1;}
    .aw-action-text{font-size:13px;color:#a0b8d0;line-height:1.6;padding-top:3px;}
    .aw-field{margin-bottom:20px;}
    .aw-field-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:#4a9eff;font-weight:700;margin-bottom:8px;display:block;}
    .aw-findings-header{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#4a9eff;margin-bottom:16px;}

<body>
<div id="root"></div>
<script>
const { useState, useRef, useCallback } = React;
const h = React.createElement;

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result.split(",")[1]);
    r.onerror = () => reject(new Error("Read failed"));
    r.readAsDataURL(file);
  });
}
function getMimeType(file) {
  if (file.type) return file.type;
  const ext = file.name.split(".").pop().toLowerCase();
  const map = {pdf:"application/pdf",png:"image/png",jpg:"image/jpeg",jpeg:"image/jpeg",gif:"image/gif",webp:"image/webp",txt:"text/plain",csv:"text/csv",docx:"application/vnd.openxmlformats-officedocument.wordprocessingml.document"};
  return map[ext] || "application/octet-stream";
}
function isImageType(m){return m.startsWith("image/");}
function isPdfType(m){return m==="application/pdf";}
async function readAsText(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(new Error("Read failed"));r.readAsText(file);});}
function getFileIcon(mime,name){if(isImageType(mime))return"🖼️";if(isPdfType(mime))return"📄";if(mime.includes("word")||(name&&name.endsWith(".docx")))return"📝";if(mime.includes("csv")||(name&&name.endsWith(".csv")))return"📊";if(mime.startsWith("text/"))return"📃";if(name&&name.startsWith("http"))return"🔗";return"📁";}
function fmtSize(b){if(!b)return"";if(b<1024)return b+"B";if(b<1048576)return(b/1024).toFixed(1)+"KB";return(b/1048576).toFixed(1)+"MB";}

async function callClaude(messages, system, maxTokens) {
  maxTokens = maxTokens||8000;
  const res = await fetch("/.netlify/functions/claude",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens,system,messages})});
  if(!res.ok){const e=await res.text();throw new Error("API error "+res.status+": "+e);}
  const d=await res.json();
  return d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
}

function extractJSON(raw) {
  if(!raw)throw new Error("Empty response.");
  try{return JSON.parse(raw.trim());}catch(e){}
  const fm=raw.match(/```(?:json)?\s*([\s\S]*?)```/);
  if(fm){try{return JSON.parse(fm[1].trim());}catch(e){}}
  const s=raw.indexOf("{"),e=raw.lastIndexOf("}");
  if(s!==-1&&e!==-1&&e>s){try{return JSON.parse(raw.slice(s,e+1));}catch(e){}}
  if(raw.includes("{")){
    try{
      let str=raw.slice(raw.indexOf("{"));
      let br=0,bk=0,inS=false,esc=false;
      for(const c of str){if(esc){esc=false;continue;}if(c==="\\"&&inS){esc=true;continue;}if(c==='"'){inS=!inS;continue;}if(inS)continue;if(c==="{")br++;else if(c==="}")br--;else if(c==="[")bk++;else if(c==="]")bk--;}
      str=str.replace(/,?\s*"[^"]*$/,"").replace(/,?\s*:\s*"[^"]*$/,": null");
      str+="]".repeat(Math.max(0,bk))+"}".repeat(Math.max(0,br));
      return JSON.parse(str);
    }catch(e){}
  }
  throw new Error("Could not parse response. Preview: "+raw.slice(0,200));
}

function buildPDFHTML(d) {
  const findings=(d.findings||[]).map((f,i)=>`<div class="finding"><div class="finding-num">${String(i+1).padStart(2,"0")}</div><div class="finding-body"><div class="finding-title">${f.title||"Finding"}</div><div class="finding-detail">${f.detail||""}</div>${f.rootCause?`<div class="finding-root"><span class="label">Root Cause:</span> ${f.rootCause}</div>`:""} ${f.recommendation?`<div class="finding-rec"><span class="label">Recommendation:</span> ${f.recommendation}</div>`:""} ${f.metricImpact?`<div class="finding-metric"><span class="label">Metric Impact:</span> ${f.metricImpact}</div>`:""}</div></div>`).join("");
  const metrics=(d.metrics||[]).map(m=>`<div class="metric-card"><div class="metric-value">${m.value||"—"}</div><div class="metric-label">${m.label||""}</div>${m.trendLabel?`<div class="metric-trend ${m.trend==="negative"?"neg":m.trend==="positive"?"pos":""}">${m.trendLabel}</div>`:""}</div>`).join("");
  const timeline=(d.keyEvents||[]).map((e,i)=>`<div class="tl-item"><div class="tl-dot"></div><div class="tl-content"><div class="tl-date">${e.date||"Event "+(i+1)}</div><div class="tl-event">${e.event||""}</div>${e.impact?`<div class="tl-impact">${e.impact}</div>`:""}</div></div>`).join("");
  const actions=(d.correctiveActions||[]).map((a,i)=>`<div class="action-row"><div class="action-num">${i+1}</div><div class="action-text">${a}</div></div>`).join("");
  return `<!DOCTYPE html><html><head><meta charset="utf-8"><title>AAR — ${d.programName||"Program"}</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;600;700&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'Barlow',sans-serif;color:#1a1f2e;background:#fff;font-size:13px;}.page{width:210mm;min-height:297mm;margin:0 auto;padding:0;page-break-after:always;}.cover{background:#0d1626;color:#fff;padding:60px 56px;min-height:297mm;display:flex;flex-direction:column;justify-content:space-between;}.cover-badge{background:#1e3a5f;display:inline-block;padding:6px 14px;font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#7eb8f7;border-left:3px solid #4a9eff;margin-bottom:40px;}.cover-title{font-family:'Barlow Condensed',sans-serif;font-size:60px;font-weight:700;line-height:1;color:#fff;margin-bottom:12px;}.cover-subtitle{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:300;color:#7eb8f7;margin-bottom:40px;}.cover-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:32px;}.cover-meta-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#4a9eff;margin-bottom:4px;}.cover-meta-val{font-size:15px;color:#fff;font-weight:500;}.cover-bottom{font-size:11px;color:#3d5573;letter-spacing:1px;text-transform:uppercase;}.section-header{background:#0d1626;color:#fff;padding:28px 56px 24px;border-top:4px solid #4a9eff;}.section-num{font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#4a9eff;margin-bottom:6px;}.section-title{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:700;color:#fff;}.content{padding:40px 56px;}.exec-box{background:#f0f5fb;border-left:4px solid #4a9eff;padding:24px 28px;margin-bottom:32px;}.exec-box p{font-size:13.5px;line-height:1.7;color:#2a3a4a;}.metrics-strip{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:16px;margin-bottom:40px;}.metric-card{background:#0d1626;color:#fff;padding:20px 16px;text-align:center;}.metric-value{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;color:#4a9eff;}.metric-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#7eb8f7;margin-top:4px;}.metric-trend{font-size:11px;margin-top:6px;font-weight:600;}.metric-trend.neg{color:#ff6b6b;}.metric-trend.pos{color:#5ce65c;}.finding{display:flex;gap:20px;margin-bottom:32px;padding-bottom:32px;border-bottom:1px solid #e8edf5;}.finding:last-child{border-bottom:none;}.finding-num{font-family:'Barlow Condensed',sans-serif;font-size:40px;font-weight:700;color:#d0dcea;min-width:48px;line-height:1;}.finding-title{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:600;color:#0d1626;margin-bottom:8px;}.finding-detail{font-size:13px;line-height:1.7;color:#3a4a5a;margin-bottom:10px;}.finding-root,.finding-rec,.finding-metric{font-size:12px;line-height:1.6;color:#4a5a6a;margin-top:6px;padding:8px 12px;background:#f7fafd;border-left:3px solid #b0c8e8;}.label{font-weight:700;color:#1e3a5f;text-transform:uppercase;font-size:10px;letter-spacing:1px;display:block;margin-bottom:2px;}.tl-item{display:flex;gap:20px;margin-bottom:24px;}.tl-dot{width:12px;height:12px;background:#4a9eff;border-radius:50%;margin-top:4px;flex-shrink:0;}.tl-date{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:#4a9eff;text-transform:uppercase;margin-bottom:2px;}.tl-event{font-size:13px;font-weight:500;color:#1a1f2e;margin-bottom:4px;}.tl-impact{font-size:12px;color:#5a6a7a;}.action-row{display:flex;gap:16px;margin-bottom:16px;}.action-num{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:#4a9eff;min-width:28px;}.action-text{font-size:13px;line-height:1.7;color:#2a3a4a;padding-top:4px;}.footer{padding:20px 56px;border-top:1px solid #e8edf5;display:flex;justify-content:space-between;font-size:10px;color:#8a9aaa;text-transform:uppercase;}@media print{body{print-color-adjust:exact;-webkit-print-color-adjust:exact;}}</style></head><body>
<div class="page cover"><div><div class="cover-badge">After Action Report · Afterwise</div><div class="cover-title">AFTER<br>ACTION<br>REPORT</div><div class="cover-subtitle">${d.programName||"Program"}</div><div class="cover-meta"><div><div class="cover-meta-label">Generated</div><div class="cover-meta-val">${new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"})}</div></div><div><div class="cover-meta-label">Confidence</div><div class="cover-meta-val">${d.confidence||"—"}%</div></div><div><div class="cover-meta-label">Documents</div><div class="cover-meta-val">${d.docCount||"—"}</div></div></div></div><div class="cover-bottom">Afterwise · Confidential</div></div>

<div class="page"><div class="section-header"><div class="section-num">Section 02</div><div class="section-title">Key Events &amp; Timeline</div></div><div class="content">${timeline||"<p>No events extracted.</p>"}</div><div class="footer"><span>Afterwise AAR</span><span>${d.programName||""} · Confidential</span></div></div>
<div class="page"><div class="section-header"><div class="section-num">Section 03</div><div class="section-title">Findings &amp; Root Cause</div></div><div class="content">${findings||"<p>No findings extracted.</p>"}</div><div class="footer"><span>Afterwise AAR</span><span>${d.programName||""} · Confidential</span></div></div>
<div class="page"><div class="section-header"><div class="section-num">Section 04</div><div class="section-title">Corrective Actions</div></div><div class="content">${actions||"<p>No actions extracted.</p>"}</div><div class="footer"><span>Afterwise AAR</span><span>${d.programName||""} · Confidential</span></div></div>
</body></html>`;
}

function AfterWise() {
  const [step,setStep]=useState(0);
  const [docs,setDocs]=useState([]);
  const [urlInput,setUrlInput]=useState("");
  const [dragOver,setDragOver]=useState(false);
  const [loading,setLoading]=useState(false);
  const [loadingMsg,setLoadingMsg]=useState("");
  const [error,setError]=useState("");
  const [analysis,setAnalysis]=useState(null);
  const [aarData,setAarData]=useState(null);
  const [outputFormat,setOutputFormat]=useState("pdf");
  const [programName,setProgramName]=useState("");
  const [generated,setGenerated]=useState(false);
  const [reportHTML,setReportHTML]=useState(null);
  const fileInputRef=useRef();

  const handleFiles=useCallback(async(files)=>{
    const nd=[];
    for(const file of Array.from(files)){
      const mime=getMimeType(file);
      let content=null,contentType="text";
      if(isImageType(mime)){content=await fileToBase64(file);contentType="image";}
      else if(isPdfType(mime)){content=await fileToBase64(file);contentType="pdf";}
      else{try{content=await readAsText(file);contentType="text";}catch{content=await fileToBase64(file);contentType="base64";}}
      nd.push({id:Date.now()+"-"+Math.random(),name:file.name,size:file.size,mime,content,contentType});
    }
    setDocs(prev=>[...prev,...nd]);
  },[]);

  const handleDrop=useCallback((e)=>{e.preventDefault();setDragOver(false);if(e.dataTransfer.files.length)handleFiles(e.dataTransfer.files);},[handleFiles]);
  const addUrl=()=>{const u=urlInput.trim();if(!u)return;setDocs(prev=>[...prev,{id:Date.now()+"-url",name:u,size:0,mime:"text/url",content:u,contentType:"url"}]);setUrlInput("");};
  const removeDoc=(id)=>setDocs(prev=>prev.filter(d=>d.id!==id));

  const runAnalysis=async()=>{
    if(!docs.length)return;
    setError("");setLoading(true);setLoadingMsg("Ingesting and cross-referencing documents…");
    try{
      const parts=[];
      for(const doc of docs){
        if(doc.contentType==="image"){parts.push({type:"image",source:{type:"base64",media_type:doc.mime,data:doc.content}});parts.push({type:"text",text:"[Image: "+doc.name+"]"});}
        else if(doc.contentType==="pdf"){parts.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:doc.content}});parts.push({type:"text",text:"[PDF: "+doc.name+"]"});}
        else if(doc.contentType==="url"){parts.push({type:"text",text:"[URL: "+doc.content+"]"});}
        else{const pv=doc.content.length>8000?doc.content.slice(0,8000)+"\n...[truncated]":doc.content;parts.push({type:"text",text:"[Document: "+doc.name+"]\n\n"+pv});}
      }
      parts.push({type:"text",text:`Analyze all provided documents as a program analyst. Return ONLY a JSON object:
{"programName":"...","contractId":"...","confidence":87,"executiveSummary":"2-3 paragraphs...","metrics":[{"label":"Schedule Variance","value":"-11%","trend":"negative","trendLabel":"Behind Schedule"}],"keyEvents":[{"date":"Month/Year","event":"What happened","impact":"Consequence"}],"findings":[{"title":"...","detail":"...","rootCause":"...","recommendation":"...","metricImpact":"..."}],"correctiveActions":["Action 1","Action 2"],"causalChain":"Narrative..."}
No markdown, no explanation — raw JSON only.`});
      setLoadingMsg("Analyzing key events, root causes, and metric relationships…");
      const result=await callClaude([{role:"user",content:parts},{role:"assistant",content:"{"}],"You are an expert program analyst for government and defense after-action reviews. Respond with valid JSON only.",8000);
      const parsed=extractJSON("{"+result);
      parsed.docCount=docs.length;
      setAnalysis(parsed);setAarData(parsed);
      if(parsed.programName)setProgramName(parsed.programName);
      setStep(1);
    }catch(err){setError(err.message||"Analysis failed.");}
    finally{setLoading(false);setLoadingMsg("");}
  };

  const generateAAR=async()=>{
    setError("");setLoading(true);setReportHTML(null);
    setLoadingMsg("Packaging analysis into brief-ready output…");
    try{
      const fd=Object.assign({},aarData,{programName:programName||(aarData&&aarData.programName)});
      if(outputFormat==="pdf"){
        setReportHTML({type:"pdf",html:buildPDFHTML(fd)});
        setGenerated(true);setStep(2);
      }else{
        setLoadingMsg("Building slide deck…");
        const slideHTML=await callClaude([{role:"user",content:"Build a complete self-contained HTML slide presentation for this AAR.\n\nAAR DATA: "+JSON.stringify(fd)+"\n\nRequirements:\n- 8-10 slides, each <div class=\"slide\"> fixed 1280x720px\n- Dark navy: bg #0d1626, accent #4a9eff, white text\n- System fonts: Arial Black headers, Arial body. NO external fonts.\n- Slides: Cover, Executive Summary, Key Metrics, Key Events, Findings, Root Cause, Corrective Actions, Conclusion\n- Footer: slide number + program name\n- @media print: .slide page-break-after:always\n- Zero external URLs\n- Output ONLY raw HTML starting with <!DOCTYPE html>"}],"Output only complete valid self-contained HTML. No explanation. No markdown. Start with <!DOCTYPE html>.",8000);
        let html=slideHTML.trim();
        if(html.includes("<!DOCTYPE"))html=html.slice(html.indexOf("<!DOCTYPE"));
        html=html.replace(/```[\s\S]*$/,"").trim();
        setReportHTML({type:"slides",html});
        setGenerated(true);setStep(2);
      }
    }catch(err){setError(err.message||"Generation failed.");}
    finally{setLoading(false);setLoadingMsg("");}
  };

  const steps=["Document Ingest","Analysis Engine","AAR Generator"];

  return h("div",{className:"aw-app"},
    h("nav",{className:"aw-nav"},
      h("a",{className:"aw-logo",href:"index.html"},"After",h("span",null,"wise")),
      h("div",{className:"aw-nav-badge"},"Program Intelligence · Early Access")
    ),
    h("div",{className:"aw-steps"},
      steps.map((label,i)=>h("div",{key:i,className:"aw-step"+(step===i?" active":"")+(step>i?" done":""),onClick:()=>step>i&&setStep(i)},
        h("div",{className:"aw-step-num"},step>i?"✓":i+1),
        h("div",{className:"aw-step-label"},label),
        i<2&&h("span",{style:{color:"#1e3a5f",fontSize:16,marginLeft:24}},"›")
      ))
    ),
    h("div",{className:"aw-main"},
      error&&h("div",{className:"aw-error"},"⚠ "+error),

      // STEP 0: INGEST
      step===0&&h("div",null,
        h("div",{className:"aw-section-title"},"Document Ingest"),
        h("div",{className:"aw-section-sub"},"Upload all program documents. Afterwise cross-references everything simultaneously."),
        h("div",{className:"aw-dropzone"+(dragOver?" drag-over":""),onDragOver:e=>{e.preventDefault();setDragOver(true);},onDragLeave:()=>setDragOver(false),onDrop:handleDrop,onClick:()=>fileInputRef.current&&fileInputRef.current.click()},
          h("div",{className:"aw-dz-icon"},"📂"),
          h("div",{className:"aw-dz-title"},"Drop files here or click to browse"),
          h("div",{className:"aw-dz-sub"},"Any format, any mix."),
          h("div",{className:"aw-dz-types"},["PDF","DOCX","TXT","CSV","PNG","JPG","WEBP"].map(t=>h("span",{key:t,className:"aw-type-badge"},t))),
          h("input",{ref:fileInputRef,type:"file",multiple:true,style:{display:"none"},accept:".pdf,.docx,.txt,.csv,.png,.jpg,.jpeg,.webp",onChange:e=>handleFiles(e.target.files)})
        ),
        h("div",{className:"aw-url-row"},
          h("input",{className:"aw-input",placeholder:"Paste a URL to include…",value:urlInput,onChange:e=>setUrlInput(e.target.value),onKeyDown:e=>e.key==="Enter"&&addUrl()}),
          h("button",{className:"aw-btn aw-btn-ghost",onClick:addUrl},"Add Link")
        ),
        docs.length>0&&h("div",{className:"aw-file-list"},
          docs.map(doc=>h("div",{key:doc.id,className:"aw-file-item"},
            h("span",{className:"aw-file-icon"},getFileIcon(doc.mime,doc.name)),
            h("span",{className:"aw-file-name"},doc.name),
            h("span",{className:"aw-file-type"},(doc.mime.split("/")[1]||"FILE").toUpperCase().slice(0,8)),
            doc.size>0&&h("span",{className:"aw-file-size"},fmtSize(doc.size)),
            h("button",{className:"aw-btn aw-btn-danger",onClick:()=>removeDoc(doc.id)},"Remove")
          ))
        ),
        h("div",{className:"aw-btn-row"},
          docs.length>0&&h("span",{className:"aw-count-badge"},docs.length+" document"+(docs.length!==1?"s":"")+" staged"),
          loading
            ?h("div",{className:"aw-loading"},h("div",{className:"aw-spinner"}),h("div",{className:"aw-loading-title"},loadingMsg),h("div",{className:"aw-loading-sub"},"Claude is reading all documents simultaneously"))
            :h("button",{className:"aw-btn aw-btn-primary",disabled:docs.length===0,onClick:runAnalysis},"Run Analysis →")
        )
      ),

      // STEP 1: ANALYSIS
      step===1&&analysis&&h("div",null,
        h("div",{className:"aw-section-title"},"Analysis Results"),
        h("div",{className:"aw-section-sub"},"Cross-referenced "+analysis.docCount+" document"+(analysis.docCount!==1?"s":"")+". Confidence: "+analysis.confidence+"%"),
        analysis.metrics&&analysis.metrics.length>0&&h("div",{className:"aw-metrics-grid"},
          analysis.metrics.map((m,i)=>h("div",{key:i,className:"aw-metric-card"},
            h("div",{className:"aw-metric-val"},m.value),
            h("div",{className:"aw-metric-lbl"},m.label),
            m.trendLabel&&h("div",{className:"aw-metric-trend "+(m.trend==="negative"?"neg":m.trend==="positive"?"pos":"")},(m.trend==="negative"?"▼":m.trend==="positive"?"▲":"●")+" "+m.trendLabel)
          ))
        ),
        h("div",{className:"aw-analysis-panel"},h("div",{className:"aw-analysis-title"},"📋 Executive Summary"),h("div",{className:"aw-analysis-body"},analysis.executiveSummary)),
        analysis.keyEvents&&analysis.keyEvents.length>0&&h("div",{className:"aw-analysis-panel"},
          h("div",{className:"aw-analysis-title"},"📅 Key Events Timeline"),
          h("div",{className:"aw-timeline"},analysis.keyEvents.map((e,i)=>h("div",{key:i,className:"aw-tl-item"},
            h("div",{style:{position:"relative"}},h("div",{className:"aw-tl-dot"}),i<analysis.keyEvents.length-1&&h("div",{className:"aw-tl-line"})),
            h("div",null,h("div",{className:"aw-tl-date"},e.date),h("div",{className:"aw-tl-event"},e.event),e.impact&&h("div",{className:"aw-tl-impact"},e.impact))
          )))
        ),
        analysis.causalChain&&h("div",{className:"aw-analysis-panel"},h("div",{className:"aw-analysis-title"},"🔗 Causal Analysis"),h("div",{className:"aw-analysis-body"},analysis.causalChain)),
        analysis.findings&&analysis.findings.length>0&&h("div",{style:{marginBottom:24}},
          h("div",{className:"aw-findings-header"},"⚡ Findings & Root Cause"),
          analysis.findings.map((f,i)=>h("div",{key:i,className:"aw-finding-card"},
            h("h4",null,f.title),h("p",null,f.detail),
            f.rootCause&&h("div",{className:"aw-finding-root"},h("strong",null,"Root Cause"),f.rootCause),
            f.recommendation&&h("div",{className:"aw-finding-root",style:{borderColor:"#1e4a2f",color:"#5a9a7a"}},h("strong",{style:{color:"#5ce6aa"}},"Recommendation"),f.recommendation),
            f.metricImpact&&h("div",{className:"aw-finding-root",style:{borderColor:"#3a2a1a",color:"#9a8a6a"}},h("strong",{style:{color:"#ffaa4a"}},"Metric Impact"),f.metricImpact)
          ))
        ),
        analysis.correctiveActions&&analysis.correctiveActions.length>0&&h("div",{style:{marginBottom:32}},
          h("div",{className:"aw-findings-header"},"✅ Corrective Actions"),
          h("div",{className:"aw-actions-list"},analysis.correctiveActions.map((a,i)=>h("div",{key:i,className:"aw-action-item"},h("div",{className:"aw-action-num"},i+1),h("div",{className:"aw-action-text"},a))))
        ),
        h("div",{className:"aw-btn-row"},
          h("button",{className:"aw-btn aw-btn-ghost",onClick:()=>setStep(0)},"← Back"),
          h("button",{className:"aw-btn aw-btn-primary",onClick:()=>setStep(2)},"Generate AAR →")
        )
      ),

      // STEP 2: GENERATE
      step===2&&h("div",null,
        h("div",{className:"aw-section-title"},"AAR Generator"),
        h("div",{className:"aw-section-sub"},"Generate a brief-ready report. Preview renders below — open in new tab to print as PDF."),
        reportHTML&&h("div",{style:{marginBottom:24}},
          h("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:"#4a9eff",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}},
            h("span",null,"✅ "+(reportHTML.type==="pdf"?"AAR Report Preview":"Slide Deck Preview")),
            h("button",{className:"aw-btn aw-btn-ghost",style:{fontSize:11},onClick:()=>{const w=window.open();if(w){w.document.write(reportHTML.html);w.document.close();}else{alert("Right-click the preview → Open Frame in New Tab → File → Print → Save as PDF.");}}},"↗ Open in New Tab")
          ),
          h("iframe",{srcDoc:reportHTML.html,style:{width:"100%",height:reportHTML.type==="slides"?520:700,border:"1px solid #1e3a5f",background:"#fff"},title:"AAR Preview",sandbox:"allow-same-origin"}),
          h("div",{style:{fontSize:11,color:"#3a5a7a",marginTop:8}},"To save: click 'Open in New Tab' → File → Print → Save as PDF")
        ),
        h("div",{className:"aw-aar-card"},
          h("h3",null,"Report Configuration"),
          h("div",{className:"aw-field"},
            h("label",{className:"aw-field-label"},"Program Name"),
            h("input",{className:"aw-input",value:programName,onChange:e=>setProgramName(e.target.value),placeholder:"Program / Contract name for report cover"})
          ),
          h("div",{className:"aw-field"},
            h("label",{className:"aw-field-label"},"Output Format"),
            h("div",{className:"aw-aar-options"},
              h("div",{className:"aw-aar-opt"+(outputFormat==="pdf"?" selected":""),onClick:()=>setOutputFormat("pdf")},h("div",{className:"aw-aar-opt-icon"},"📄"),h("div",{className:"aw-aar-opt-title"},"PDF Report"),h("div",{className:"aw-aar-opt-desc"},"Preview below → open in new tab → Print → Save as PDF")),
              h("div",{className:"aw-aar-opt"+(outputFormat==="pptx"?" selected":""),onClick:()=>setOutputFormat("pptx")},h("div",{className:"aw-aar-opt-icon"},"📊"),h("div",{className:"aw-aar-opt-title"},"Slide Deck"),h("div",{className:"aw-aar-opt-desc"},"HTML slide deck → open in new tab → Print → Save as PDF"))
            )
          ),
          aarData&&h("div",{style:{background:"#080e1a",border:"1px solid #1a2f4a",padding:"16px 20px",marginBottom:24}},
            h("div",{style:{fontFamily:"'Barlow Condensed',sans-serif",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:2,color:"#4a9eff",marginBottom:12}},"Report Contents"),
            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,fontSize:12,color:"#5a7a9a"}},
              h("div",null,"📋 Executive Summary"),h("div",null,"📊 "+(aarData.metrics||[]).length+" Metrics"),
              h("div",null,"📅 "+(aarData.keyEvents||[]).length+" Key Events"),h("div",null,"⚡ "+(aarData.findings||[]).length+" Findings"),
              h("div",null,"🔗 Root Cause Analysis"),h("div",null,"✅ "+(aarData.correctiveActions||[]).length+" Corrective Actions")
            )
          ),
          loading
            ?h("div",{className:"aw-loading"},h("div",{className:"aw-spinner"}),h("div",{className:"aw-loading-title"},loadingMsg))
            :h("div",{className:"aw-btn-row"},
                h("button",{className:"aw-btn aw-btn-ghost",onClick:()=>setStep(1)},"← Back to Analysis"),
                h("button",{className:"aw-btn aw-btn-primary",onClick:generateAAR},outputFormat==="pdf"?"Generate PDF Report →":"Generate Slide Deck →"),
                generated&&h("button",{className:"aw-btn aw-btn-success",onClick:generateAAR},"↻ Regenerate")
              )
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(AfterWise));
</script>
</body>
</html>
